<style>
body {
  font-family: 'Montserrat', sans-serif;
  margin: 0;
  background: #f7f5f2;
  color: #1a1a1a;
  letter-spacing: 0.2px;
}

/* HEADER */
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 25px 50px;
  background: #f1efec;
  border-bottom: 1px solid #e8e4df;
}

/* LOGO */
.logo img {
  height: 130px;
  width: auto;
}

/* TITLE */
.center {
  text-align: center;
}

.center h1 {
  font-family: 'Montserrat', serif;
  font-size: 36px;
  margin: 0;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14.5px;
  color: #8a847e;
  margin-top: 10px;
  max-width: 480px;
  margin-inline: auto;
  line-height: 1.8;
  letter-spacing: 0.3px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.controls input {
  width: 260px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #e0dbd5;
  background: white;
}

.controls select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #e0dbd5;
  background: white;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 18px 0;
}

.tab {
  padding: 8px 18px;
  border-radius: 30px;
  background: #e9e6e2;
  font-size: 13px;
  cursor: pointer;
}

.tab:hover {
  background: #dedbd6;
}

.tabs .tab.active {
  background: #1a1a1a;
  color: #ffffff;
}

/* CONTENT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 50px 20px;
}

/* SECTION */
.section {
  margin-bottom: 50px;
}

.section h3 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 5px;
}

.section-desc {
  font-size: 13px;
  color: #6e6a66;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 18px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #f0ede8;
  transition: 0.25s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.04);
}

/* PREMIUM HIGHLIGHT */
.card.premium {
  border: 1px solid #e2d4bc;
  background: #fffcf7;
}

.name {
  font-size: 14px;
  line-height: 1.5;
}

.price {
  font-size: 13px;
  margin-top: 8px;
  color: #3a3632;
}

/* TAGS */
.tag {
  font-size: 10px;
  background: #f0ede8;
  padding: 5px 7px;
  border-radius: 5px;
  margin-top: 6px;
  margin-right: 4px;
  display: inline-block;
  color: #5e5954;
}

/* =========================
   MOBILE RESPONSIVE FIX
========================= */

@media (max-width: 768px) {

  /* HEADER STACK */
  .header {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 20px;
    text-align: center;
  }

  .logo img {
    height: 90px;
    margin: 0 auto;
  }

  /* TITLE */
  .center h1 {
    font-size: 26px;
  }

  .tagline {
    font-size: 12px;
  }

  /* CONTROLS: not sticky in header on mobile — moved to sticky bar */
  .controls {
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .controls input,
  .controls select {
    width: 100%;
    box-sizing: border-box;
  }

  /* TABS SCROLLABLE */
  .tabs {
    overflow-x: auto;
    justify-content: flex-start;
    padding: 12px 10px;
    gap: 8px;
  }

  .tab {
    flex: 0 0 auto;
    font-size: 12px;
    padding: 7px 14px;
  }

  /* CONTENT PADDING */
  .container {
    padding: 30px 15px;
  }

  /* GRID → 1 COLUMN */
  .grid {
    grid-template-columns: 1fr;
  }

  /* CARD */
  .card {
    padding: 16px;
  }

  /* STICKY CONTROLS ON MOBILE */
  .controls {
    position: sticky;
    top: 0;
    background: #f1efec;
    padding: 10px;
    z-index: 10;
    border-bottom: 1px solid #e8e4df;
  }
}
.footer {
  text-align: center;
  padding: 30px 20px 40px;
  font-size: 13px;
  color: #6e6a66;
  border-top: 1px solid #e8e4df;
}

.footer p {
  margin: 0 0 8px;
}

.footer a {
  color: #8E234A;
  text-decoration: none;
}

.footer a:hover {
  text-decoration: underline;
}

.dot {
  margin: 0 8px;
  color: #c5c0bb;
}
</style>
</head>

<script>
const tabsEl = document.getElementById("tabs");
const output = document.getElementById("output");

let state = {
  category: "all",
  sub: "all",
  concern: "all",
  search: "",
  sort: ""
};

/* CATEGORY TABS */
const categories = ["all", ...new Set(data.map(d => d.category))];

categories.forEach(cat => {
  const el = document.createElement("div");
  el.className = "tab";
  el.innerText = cat.toUpperCase();

  el.onclick = () => {
  state.category = cat;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  updateSub();
  render();
};

  if(cat==="all") el.classList.add("active");
  tabsEl.appendChild(el);
});

/* CONTROLS */
document.getElementById("search").oninput = e => {
  state.search = e.target.value.toLowerCase();
  render();
};

document.getElementById("sort").onchange = e => {
  state.sort = e.target.value;
  render();
};

document.getElementById("concern").onchange = e => {
  state.concern = e.target.value;
  render();
};

const subSelect = document.getElementById("sub");

function updateSub(){
  const subs = ["all", ...new Set(
    data
      .filter(p => state.category==="all" || p.category===state.category)
      .map(p => p.sub)
  )];

  subSelect.innerHTML = subs.map(s=>`<option value="${s}">${s}</option>`).join("");
}

subSelect.onchange = e => {
  state.sub = e.target.value;
  render();
};

function render(){
  let filtered = data.filter(p =>
    (state.category==="all" || p.category===state.category) &&
    (state.sub==="all" || p.sub===state.sub) &&
    (state.concern==="all" || p.concern.includes(state.concern)) &&
    p.name.toLowerCase().includes(state.search)
  );

  if(state.sort==="low"){
    filtered.sort((a,b)=>(a.price??9999)-(b.price??9999));
  } else if(state.sort==="high"){
    filtered.sort((a,b)=>(b.price??0)-(a.price??0));
  }

  const grouped = {};

  filtered.forEach(p=>{
    if(!grouped[p.sub]) grouped[p.sub]=[];
    grouped[p.sub].push(p);
  });

  output.innerHTML="";

  Object.keys(grouped).forEach(sub=>{
    const section=document.createElement("div");
    section.className="section";
    section.innerHTML=`<h3>${sub}</h3>`;

    const grid=document.createElement("div");
    grid.className="grid";

    grouped[sub].forEach(p=>{
      const card=document.createElement("div");
      card.className="card";

      if(p.price && p.price >= 700){
        card.classList.add("premium");
      }

      card.innerHTML=`
        <div class="name">${p.name}</div>
        <div class="price">${p.price ? "₹"+p.price : "On Request"}</div>
        <div>${p.concern.map(c=>`<span class="tag">${c}</span>`).join("")}</div>
      `;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    output.appendChild(section);
  });
}

updateSub();
render();
</script>
