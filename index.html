        .new-header {
            background-color: #fff;

            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .header-left { flex: 1; min-width: 300px; }

        .header-title {
            font-family: var(--font-ui); /* Montserrat as per original request */
            font-size: 3.2rem;
            line-height: 1.1;

            color: var(--text-dark);
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .header-title .bold-part { font-weight: 700; }
        .header-title .light-part { font-weight: 400; color: var(--text-burgundy); }

        .header-tagline {
            font-size: 0.9rem;
            color: var(--text-subtle);
            max-width: 500px;
            margin-top: 0.5rem;
        }

        .brand-logo { max-height: 150px; width: auto; display: block; }
        
        @media (max-width: 768px) {
            .new-header { flex-direction: column; text-align: center; align-items: center; padding: 1.5rem 5%; }
            .header-left { width: 100%; }
            .header-title { justify-content: center; font-size: 2.2rem; flex-wrap: wrap; }
            .header-tagline { margin: 0.5rem auto 0; }
        }

        /* --- CONTROLS --- */
        .controls-container {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 1.5rem 5%;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .search-wrapper { width: 100%; max-width: 500px; position: relative; }
        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: var(--font-ui); /* Montserrat */
            background: #fff;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999; width: 18px; }

        .filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            background: transparent;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: var(--font-ui); /* Montserrat */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .tab-btn.active { background: var(--text-dark); color: #fff; border-color: var(--text-dark); }

        /* --- CATALOGUE LAYOUT --- */
        .catalogue-container { max-width: 1200px; margin: 0 auto; padding: 2rem 20px; }
        .category-section { margin-bottom: 3rem; scroll-margin-top: 100px; }

        .category-title {
            font-family: var(--font-ui);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;

        .cat-body { color: var(--color-body); border-color: var(--color-body); }
        .cat-hair { color: var(--color-hair); border-color: var(--color-hair); }
        .cat-sun { color: var(--color-sun); border-color: var(--color-sun); }
        .cat-wellness { color: var(--color-wellness); border-color: var(--color-wellness); }

            font-weight: 400;
            color: var(--text-dark);
            margin: 1.5rem 0 1rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
        }

        /* --- CARD STYLING --- */
        .product-card {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-top: 4px solid transparent;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            position: relative;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.05), 0 10px 10px rgba(0,0,0,0.02);

        .product-card.card-face:hover { border-top-color: var(--color-face); }

            text-transform: uppercase;
            letter-spacing: 1px;

            font-family: var(--font-ui);

            margin-top: auto;
            padding-top: 1rem;

            font-size: 1.1rem;

    let currentFilter = 'all';
    let searchQuery = '';

    function handleSearch() {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        renderCatalogue();
    }

    function filterBy(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderCatalogue();
    }

    function formatPrice(price) {
        if (price === null || price === undefined) return '<span class="p-price-placeholder">Price on Request</span>';
        return '₹' + Number(price).toLocaleString('en-IN');
    }

    function getCategoryClassSuffix(cat) {
        if (cat.includes('Face')) return 'face';
        if (cat.includes('Body')) return 'body';
        if (cat.includes('Hair')) return 'hair';
        if (cat.includes('Sun')) return 'sun';
        return 'wellness';
    }

    function getCategoryColorClass(cat) {
        if (cat.includes('Face')) return 'cat-face';
        if (cat.includes('Body')) return 'cat-body';
        if (cat.includes('Hair')) return 'cat-hair';
        if (cat.includes('Sun')) return 'cat-sun';
        return 'cat-wellness';
    }
    
    // Helper to get the actual color value for the tag background
    function getCategoryColorValue(cat) {
        if (cat.includes('Face')) return 'var(--color-face)';
        if (cat.includes('Body')) return 'var(--color-body)';
        if (cat.includes('Hair')) return 'var(--color-hair)';
        if (cat.includes('Sun')) return 'var(--color-sun)';
        return 'var(--color-wellness)';
    }

    function renderCatalogue() {
        const container = document.getElementById('catalogueGrid');
        container.innerHTML = '';

        let filtered = rawData.filter(item => {
            const matchesCat = currentFilter === 'all' || item.category === currentFilter || (currentFilter === 'Wellness' && item.category === 'Wellness');
            
            let matchesSearch = true;
            if (searchQuery) {
                const text = (item.name + ' ' + item.sub + ' ' + item.category + ' ' + (item.concern ? item.concern.join(' ') : '')).toLowerCase();
                matchesSearch = text.includes(searchQuery);
            }
            return matchesCat && matchesSearch;
        });

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">No products found matching your criteria.</div>';
            return;
        }

        const grouped = {};
        filtered.forEach(item => {
            if (!grouped[item.category]) grouped[item.category] = {};
            if (!grouped[item.category][item.sub]) grouped[item.category][item.sub] = [];
            grouped[item.category][item.sub].push(item);
        });

        Object.keys(grouped).forEach(catName => {
            const section = document.createElement('div');
            section.className = 'category-section';
            
            const catTitle = document.createElement('div');
            catTitle.className = `category-title ${getCategoryColorClass(catName)}`;
            catTitle.textContent = catName;
            section.appendChild(catTitle);

            const subs = grouped[catName];
            const cardClassSuffix = getCategoryClassSuffix(catName);
            const tagColor = getCategoryColorValue(catName);

            Object.keys(subs).forEach(subName => {
                const subTitle = document.createElement('h3');
                subTitle.className = 'subcategory-title';
                subTitle.textContent = subName;
                section.appendChild(subTitle);

                const grid = document.createElement('div');
                grid.className = 'product-grid';

                subs[subName].forEach(product => {
                    const card = document.createElement('div');
                    card.className = `product-card card-${cardClassSuffix}`;
                    
                    const metaText = `${product.size ? product.size : ''}`.trim();
                    
                    // UPDATED CARD HTML: Subcategory on top, Category Tag with Color next to price
                    card.innerHTML = `
                        <div>
                            <div class="p-subcat">${product.sub}</div>
                            <div class="p-name">${product.name}</div>
                            <div class="p-meta">${metaText}</div>
                        </div>
                        <div class="p-price-row">
                            <div class="p-price">${formatPrice(product.price)}</div>
                            <div class="cat-tag" style="background-color: ${tagColor}">${product.category.split(' ')[0]}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
            });

            container.appendChild(section);
        });
    }

    renderCatalogue();
